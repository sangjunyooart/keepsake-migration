<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Keepsake Control</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0c0c0c;color:#ddd;font-family:'SF Mono',Monaco,Menlo,monospace;font-size:13px}

/* ── TOP BAR ── */
#bar{
  height:38px;display:flex;align-items:center;gap:1px;
  padding:0 6px;background:#141414;border-bottom:1px solid #1f1f1f;
  user-select:none;flex-shrink:0;overflow-x:auto;
}
.tab{
  display:flex;align-items:center;gap:5px;
  padding:3px 11px;border-radius:5px;cursor:pointer;
  font-size:11px;color:#666;transition:background .12s,color .12s;
  white-space:nowrap;flex-shrink:0;
}
.tab:hover{background:#1e1e1e;color:#bbb}
.tab.active{background:#222;color:#eee}
.tab .dot{
  width:7px;height:7px;border-radius:50%;background:#333;
  flex-shrink:0;transition:background .4s,box-shadow .4s;
}
.dot.ok {background:#3fb950}
.dot.err{background:#f85149;box-shadow:0 0 5px #f8514966}
.dot.spin{background:#d29922;animation:blink 1.1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#updated{margin-left:auto;font-size:10px;color:#333;padding-right:4px;white-space:nowrap;flex-shrink:0}

/* ── OVERVIEW GRID ── */
#overview{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:12px;height:calc(100vh - 38px);overflow:auto;align-content:start;
}
.card{
  background:#111;border:1px solid #1e1e1e;border-radius:8px;
  padding:14px 14px 12px;
  display:flex;flex-direction:column;gap:8px;
}
.card .top{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.card .top:hover .svc-name{color:#ccc}
.card .port-label{font-size:10px;color:#444;letter-spacing:.06em}
.card .svc-name{font-size:12px;color:#888;transition:color .12s}
.card .code{font-size:22px;font-weight:700;line-height:1;margin-left:auto;margin-top:2px}
.code.ok {color:#3fb950}
.code.err{color:#f85149}
.code.spin{color:#555}

/* ── INLINE CONTROLS ── */
.controls{
  display:flex;flex-direction:column;gap:5px;
  border-top:1px solid #1a1a1a;padding-top:8px;
}
.ctrl-row{display:flex;align-items:center;gap:6px;min-height:24px}
.ctrl-label{font-size:10px;color:#444;width:80px;flex-shrink:0;letter-spacing:.04em;text-transform:uppercase}
.ctrl-val{font-size:11px;color:#666;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* toggle pill */
.pill{
  display:flex;align-items:center;gap:0;
  background:#1a1a1a;border:1px solid #252525;border-radius:20px;
  padding:0;overflow:hidden;flex-shrink:0;
}
.pill-btn{
  padding:3px 10px;font-size:10px;font-family:inherit;
  cursor:pointer;border:none;background:transparent;
  color:#555;transition:background .15s,color .15s;
  letter-spacing:.04em;
}
.pill-btn:hover{color:#999}
.pill-btn.on {background:#1a3a1e;color:#3fb950}
.pill-btn.off{background:#3a1a1a;color:#f85149}

/* action button */
.act-btn{
  padding:3px 9px;font-size:10px;font-family:inherit;
  cursor:pointer;border:1px solid #252525;border-radius:4px;
  background:#181818;color:#666;
  transition:background .12s,color .12s,border-color .12s;
}
.act-btn:hover{background:#222;color:#bbb;border-color:#333}

.open-lnk{
  font-size:10px;color:#333;cursor:pointer;
  margin-left:auto;transition:color .12s;flex-shrink:0;
}
.open-lnk:hover{color:#666}

/* ── IFRAME VIEW ── */
#frame-wrap{display:none;height:calc(100vh - 38px)}
#frame-wrap iframe{width:100%;height:100%;border:none;background:#fff}
</style>
</head>
<body>

<div id="bar">
  <div class="tab active" id="tab-home" onclick="showOverview()" title="Overview">⌂</div>
</div>

<div id="overview"></div>
<div id="frame-wrap"><iframe id="main-frame" src="about:blank"></iframe></div>

<script>
const DRIFT_PORTS = [8000,8001,8002,8003];
const SVCS = [
  {id:'ar',  name:'drift · ar',   port:8000, path:'/'},
  {id:'en',  name:'drift · en',   port:8001, path:'/'},
  {id:'gr',  name:'drift · gr',   port:8002, path:'/'},
  {id:'br',  name:'drift · br',   port:8003, path:'/'},
  {id:'px',  name:'parallax',     port:8765, path:'/'},
  {id:'mon', name:'monitor',      port:8080, path:'/monitor', local:true},
];

/* keywords that flag an endpoint as a "toggle / state" control */
const TOGGLE_KEYS = ['toggle','auto','tick','drift','start','stop','enable','disable','status','state','run','pause'];
const IGNORE_PATHS = ['/openapi.json','/docs','/redoc','/favicon.ico'];

const bar      = document.getElementById('bar');
const overview = document.getElementById('overview');

/* ── build tabs + cards ── */
SVCS.forEach(svc => {
  const tab = document.createElement('div');
  tab.className = 'tab';
  tab.id = `tab-${svc.id}`;
  tab.onclick = () => showFrame(svc);
  tab.innerHTML = `<span class="dot spin" id="dot-${svc.id}"></span>${svc.name}`;
  bar.appendChild(tab);

  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${svc.id}`;
  card.innerHTML = `
    <div class="top" onclick="showFrame(svc_map['${svc.id}'])">
      <div>
        <div class="port-label">:${svc.port}${svc.path!=='/'?svc.path:''}</div>
        <div class="svc-name">${svc.name}</div>
      </div>
      <div class="code spin" id="st-${svc.id}">—</div>
    </div>
    <div class="controls" id="ctrl-${svc.id}">
      <div class="ctrl-row"><div class="ctrl-val" style="color:#2a2a2a;font-size:10px">loading…</div></div>
    </div>`;
  overview.appendChild(card);
});

const svc_map = Object.fromEntries(SVCS.map(s => [s.id, s]));
bar.appendChild(Object.assign(document.createElement('span'), {id:'updated'}));

/* ── openapi discovery ── */
async function discoverControls(svc) {
  const ctrl = document.getElementById(`ctrl-${svc.id}`);
  if (svc.local) { ctrl.innerHTML = ''; return; }

  let paths = null;
  try {
    const r = await fetch(`http://localhost:${svc.port}/openapi.json`, {signal:AbortSignal.timeout(3000)});
    if (r.ok) paths = (await r.json()).paths;
  } catch { /* server not up */ }

  if (!paths) {
    ctrl.innerHTML = `<div class="ctrl-row"><div class="ctrl-val" style="color:#333;font-size:10px">—</div></div>`;
    return;
  }

  /* collect interesting endpoints */
  const interesting = Object.entries(paths).filter(([path, methods]) => {
    if (IGNORE_PATHS.includes(path)) return false;
    const low = path.toLowerCase();
    return TOGGLE_KEYS.some(k => low.includes(k));
  });

  if (!interesting.length) {
    ctrl.innerHTML = `<div class="ctrl-row"><div class="ctrl-val" style="color:#333;font-size:10px">no controls found</div></div>`;
    return;
  }

  /* render each interesting endpoint as a compact control row */
  let html = '';
  for (const [path, methods] of interesting) {
    const label = path.replace(/^\//, '').replace(/\//g,' · ').replace(/_/g,' ');
    const hasGet  = 'get'  in methods;
    const hasPost = 'post' in methods;

    html += `<div class="ctrl-row">
      <div class="ctrl-label" title="${path}">${label}</div>`;

    if (hasPost && (path.toLowerCase().includes('toggle') || path.toLowerCase().includes('tick'))) {
      /* render as ON/OFF pill toggle */
      html += `<div class="pill">
        <button class="pill-btn" onclick="callApi(${svc.port},'${path}',{action:'on'})">ON</button>
        <button class="pill-btn" onclick="callApi(${svc.port},'${path}',{action:'off'})">OFF</button>
      </div>`;
    } else if (hasPost) {
      html += `<button class="act-btn" onclick="callApi(${svc.port},'${path}',{})">run</button>`;
    }

    if (hasGet) {
      html += `<button class="act-btn" onclick="getApi(${svc.port},'${path}','st-${svc.id}-${path.replace(/\W/g,'')}')">get</button>
               <span class="ctrl-val" id="st-${svc.id}-${path.replace(/\W/g,'')}"></span>`;
    }

    html += `<span class="open-lnk" onclick="showFrame(svc_map['${svc.id}'])">↗</span>
    </div>`;
  }
  ctrl.innerHTML = html;
}

async function callApi(port, path, body) {
  try {
    const r = await fetch(`http://localhost:${port}${path}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const txt = await r.text();
    console.log(`POST :${port}${path} → ${r.status}`, txt);
  } catch(e) { console.error(e); }
}

async function getApi(port, path, spanId) {
  const span = document.getElementById(spanId);
  try {
    const r = await fetch(`http://localhost:${port}${path}`, {signal:AbortSignal.timeout(3000)});
    const txt = await r.text();
    let val = txt;
    try { val = JSON.stringify(JSON.parse(txt)); } catch {}
    if (span) span.textContent = val.substring(0, 60);
  } catch { if (span) span.textContent = 'err'; }
}

/* ── health poll ── */
async function poll() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    SVCS.forEach(svc => {
      if (svc.local) return;
      const code = data[svc.port] ?? 0;
      const ok   = code>=200 && code<400;
      document.getElementById(`dot-${svc.id}`).className = `dot ${ok?'ok':'err'}`;
      const st = document.getElementById(`st-${svc.id}`);
      st.className = `code ${ok?'ok':'err'}`;
      st.textContent = ok ? code : (code===0?'DOWN':code);
    });
    document.getElementById('dot-mon').className = 'dot ok';
    document.getElementById('st-mon').className  = 'code ok';
    document.getElementById('st-mon').textContent = '200';
    const n = new Date();
    document.getElementById('updated').textContent =
      `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
  } catch {}
}

function showOverview() {
  document.getElementById('overview').style.display = 'grid';
  document.getElementById('frame-wrap').style.display = 'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-home').classList.add('active');
}
function showFrame(svc) {
  document.getElementById('overview').style.display = 'none';
  document.getElementById('frame-wrap').style.display = 'block';
  document.getElementById('main-frame').src = `http://localhost:${svc.port}${svc.path}`;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`tab-${svc.id}`).classList.add('active');
}

/* init */
poll();
setInterval(poll, 10000);
SVCS.forEach(discoverControls);
</script>
</body>
</html>
